name: Corpac Scraper Trimestral

on:
  schedule:
    # Se ejecuta a las 00:00 el día 1 de enero, abril, julio y octubre
    - cron: '0 0 1 1,4,7,10 *'
  workflow_dispatch: # Permite ejecución manual desde la pestaña Actions

# Permisos necesarios para que el bot pueda subir archivos al repo
permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout del código
      uses: actions/checkout@v4

    - name: Configurar Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'

    - name: Instalar Google Chrome
      run: |
        sudo apt-get update
        sudo apt-get install -y google-chrome-stable

    - name: Instalar dependencias de Python
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt

    - name: Ejecutar Scraper
      run: python scraper.py

    - name: Guardar cambios en el repositorio
      run: |
        git config --global user.name "github-actions[bot]"
        git config --global user.email "github-actions[bot]@users.noreply.github.com"
        
        # Agregamos la carpeta donde se descargan los archivos
        git add data_corpac/
        
        # Verificamos si hay cambios antes de hacer el commit para evitar errores
        if [ -n "$(git status --porcelain)" ]; then
          git commit -m "Descarga automática Corpac: $(date +'%Y-%m-%d')"
          git push
        else
          echo "No hay archivos nuevos para subir."
        fi
